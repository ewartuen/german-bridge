<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <title id="page-title">German Bridge Scoreboard & Tracker Tool | 德國橋牌智慧計分板</title>
    <meta name="description" content="An online German Bridge scoreboard tool. Effortlessly track scores with dynamic seat rotation, rule error prevention, auto-save, and instant CSV data export.">
    <meta name="keywords" content="德國橋牌, 德國橋牌計分, German Bridge, 橋牌計分板, 匯出Excel, 自動存檔, 動態座位">
    
    <style>
        :root {
            --bg-dark: #121212;
            --surface: #1e1e1e;
            --primary: #bb86fc;
            --primary-variant: #3700b3;
            --text-main: #ffffff;
            --text-muted: #a0a0a0;
            --border: #2c2c2c;
            --success: #03dac6;
            --error: #cf6679;
        }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Microsoft JhengHei", sans-serif; }
        body { background-color: var(--bg-dark); color: var(--text-main); font-size: 16px; padding-bottom: 30px; }
        
        header { background-color: var(--surface); padding: 15px; text-align: center; border-bottom: 1px solid var(--border); }
        
        .lang-switcher { display: flex; justify-content: flex-end; max-width: 1400px; margin: 0 auto 10px auto; width: 100%; }
        .lang-btn { background: none; border: none; color: var(--primary); cursor: pointer; font-size: 13px; margin-left: 12px; padding: 4px 8px; border-radius: 4px; transition: all 0.2s; font-weight: 500; }
        .lang-btn:hover { background-color: rgba(187, 134, 252, 0.1); }
        .lang-btn.active { background-color: var(--primary); color: #000; font-weight: bold; }

        header h1 { font-size: 20px; font-weight: 600; color: var(--text-main); }
        
        .nav-tabs { display: flex; background-color: var(--surface); border-bottom: 2px solid var(--border); position: sticky; top: 0; z-index: 100; }
        .tab-btn { flex: 1; padding: 15px 0; text-align: center; background: none; border: none; color: var(--text-muted); font-size: 16px; font-weight: bold; cursor: pointer; position: relative; }
        .tab-btn.active { color: var(--primary); }
        .tab-btn.active::after { content: ''; position: absolute; bottom: -2px; left: 0; width: 100%; height: 3px; background-color: var(--primary); }
        
        .main-container { padding: 16px; display: block; }
        .panel { display: none; }
        .panel.active { display: block; }
        
        .setup-card { background: var(--surface); padding: 16px; border-radius: 8px; margin-bottom: 16px; }
        .form-group { margin-bottom: 12px; }
        label { display: block; color: var(--text-muted); font-size: 14px; margin-bottom: 6px; }
        
        select, input[type="text"], input[type="number"].setup-input { width: 100%; background: #2d2d2d; border: 1px solid var(--border); color: #fff; padding: 12px; border-radius: 6px; font-size: 16px; outline: none; }
        input[type="number"].setup-input:focus { border-color: var(--primary); }
        
        .names-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 14px; margin-top: 10px; }
        
        box-sizing * { box-sizing: border-box; }
        
        .game-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .round-title { font-size: 22px; font-weight: bold; }
        .dealer-tip { font-size: 14px; color: var(--success); background: rgba(3,218,198,0.1); padding: 4px 8px; border-radius: 4px; font-weight: bold; }
        .section-label { color: var(--text-muted); font-size: 15px; margin-top: 15px; margin-bottom: 10px; }
        
        .inputs-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; text-align: center; margin-bottom: 15px; }
        .player-label { font-size: 14px; font-weight: 500; color: var(--text-main); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 6px; padding: 0 4px; }
        .player-label.dealer-highlight { color: var(--success); font-weight: bold; }
        .player-label.screw-highlight-txt { color: #f1c40f; font-weight: bold; }
        
        input[type="number"].mobile-input { width: 100%; background: #252525; border: 1px solid var(--border); color: white; text-align: center; padding: 15px 0; font-size: 20px; font-weight: bold; border-radius: 8px; -moz-appearance: textfield; }
        input[type="number"].mobile-input::-webkit-outer-spin-button, input[type="number"].mobile-input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        input[type="number"].mobile-input:focus { border-color: var(--primary); background: #2a2235; }
        input[type="number"].dealer-border { border-color: var(--success) !important; background: #162a27; }
        input[type="number"].screw-highlight { border-color: #f1c40f !important; background: #332b15; }
        
        .action-btn { width: 100%; background-color: var(--primary); color: #000; padding: 16px; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; margin: 10px 0; box-shadow: 0 4px 6px rgba(0,0,0,0.2); }
        .action-btn:disabled { background-color: #444; color: #888; box-shadow: none; }
        .action-btn.btn-secondary { background-color: #333; color: #fff; border: 1px solid #444; }
        .action-btn.btn-warning { background-color: #f39c12; color: #000; }
        .action-btn.btn-success { background-color: var(--success); color: #000; }
        
        .board-controls { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .board-controls .action-btn { margin: 0; padding: 12px; font-size: 14px; }

        .history-card { background: var(--surface); padding: 14px; border-radius: 8px; margin-top: 20px; border-left: 4px solid var(--primary); }
        .history-card h4 { font-size: 14px; color: var(--text-muted); margin-bottom: 8px; }
        .history-item { font-size: 15px; margin-bottom: 4px; display: flex; justify-content: space-between; }
        
        .table-responsive-wrapper { width: 100%; overflow-x: auto; overflow-y: auto; max-height: 75vh; } 
        .score-board-table { width: 100%; border-collapse: separate; border-spacing: 0; text-align: center; }
        
        .score-board-table th { position: sticky; top: 0; background: #1e1e1e; color: var(--text-muted); font-weight: normal; padding: 14px 6px; font-size: 13px; border-bottom: 2px solid var(--border); border-right: 1px solid var(--border); white-space: nowrap; z-index: 10; }
        .rank-0 { color: #f1c40f !important; font-weight: bold; } 
        .rank-1 { color: #bdc3c7 !important; font-weight: bold; } 
        .rank-2 { color: #e67e22 !important; font-weight: bold; } 

        .score-board-table td { padding: 14px 4px; font-size: 14px; border-bottom: 1px solid var(--border); border-right: 1px solid var(--border); background: var(--surface); }
        .score-board-table .round-col { color: var(--text-muted); font-size: 13px; width: 35px; }
        .score-detail { font-size: 10px; color: var(--text-muted); display: block; margin-top: 2px; }
        
        .score-board-table th:last-child, .score-board-table td:last-child { border-right: none; }
        
        .total-row { font-weight: bold; position: sticky; bottom: 0; z-index: 5; }
        .total-row td { color: var(--primary); font-size: 16px; padding: 18px 4px; background: #252525; border-top: 2px solid var(--border); }

        .manage-box { background: #1a1a1a; border: 1px dashed var(--primary); padding: 15px; border-radius: 8px; margin: 10px 0 15px 0; display: none; }
        .drag-list { display: flex; flex-direction: column; gap: 8px; margin: 12px 0; }
        .drag-item { display: flex; justify-content: space-between; align-items: center; background: #2d2d2d; padding: 12px 15px; border-radius: 6px; border: 1px solid var(--border); cursor: grab; }
        .drag-item:active { cursor: grabbing; background: #3d3d3d; }
        .delete-p-btn { background: none; border: none; cursor: pointer; font-size: 16px; padding: 0 4px; transition: transform 0.2s; }
        .delete-p-btn:hover { transform: scale(1.2); }

        /* 💡 說明文件區塊樣式調整 */
        .gb-doc-section { max-width: 1400px; width: calc(100% - 32px); margin: 20px auto 30px auto; padding: 10px 20px; background: var(--surface); border-radius: 12px; border: 1px solid var(--border); color: var(--text-main); text-align: left; -webkit-user-select: text; user-select: text; }
        
        /* 💡 摺疊式選單樣式 (Accordion Structure) */
        .gb-details { border-bottom: 1px solid var(--border); padding: 14px 0; }
        .gb-details:last-child { border-bottom: none; }
        
        .gb-summary { font-size: 15px; font-weight: 600; color: var(--primary); cursor: pointer; outline: none; list-style: none; display: flex; align-items: center; justify-content: space-between; user-select: none; }
        .gb-summary::-webkit-details-marker { display: none; }
        /* 自訂箭頭指示器 */
        .gb-summary::after { content: '＋'; font-size: 14px; color: var(--primary); transition: transform 0.2s ease; }
        .gb-details[open] .gb-summary::after { content: '－'; }
        
        .gb-details-content { padding-top: 12px; font-size: 13.5px; line-height: 1.6; }
        .gb-details-content h3 { font-size: 14px; color: var(--text-main); margin: 14px 0 6px 0; font-weight: bold; }
        .gb-details-content p, .gb-details-content li { color: var(--text-muted); font-size: 13.5px; margin-bottom: 6px; }
        .gb-details-content ul { padding-left: 20px; margin-top: 4px; margin-bottom: 10px; }

        @media (min-width: 850px) {
            header { padding: 25px; }
            header h1 { font-size: 26px; }
            .nav-tabs { display: none !important; }
            .main-container { display: flex; gap: 25px; max-width: 1400px; margin: 0 auto; padding: 25px; padding-bottom: 5px; }
            .panel { display: block !important; flex: 1; min-width: 0; background: var(--surface); padding: 25px; border-radius: 12px; height: fit-content; box-shadow: 0 4px 20px rgba(0,0,0,0.15); }
            #input-panel { flex: 1.2; }
            #board-panel { flex: 1.8; }
            
            .table-responsive-wrapper { max-height: 80vh; }
            .round-title { font-size: 26px; }
            .score-board-table th { font-size: 15px; padding: 15px 8px; top: 0; }
            .score-board-table td { font-size: 16px; padding: 16px 8px; }
            .gb-doc-section { width: calc(100% - 50px); margin: 10px auto 30px auto; padding: 15px 25px; }
        }
    </style>
</head>
<body>

    <header>
        <div class="lang-switcher">
            <button id="btn-en" class="lang-btn" onclick="switchGlobalLanguage('en')">English</button>
            <button id="btn-zh-HK" class="lang-btn" onclick="switchGlobalLanguage('zh-HK')">繁體中文</button>
            <button id="btn-zh-CN" class="lang-btn" onclick="switchGlobalLanguage('zh-CN')">简体中文</button>
        </div>
        <h1 id="main-heading">German Bridge Scoring System</h1>
    </header>

    <div class="nav-tabs">
        <button class="tab-btn active" id="btn-input" onclick="switchTab('input-panel')">輸入</button>
        <button class="tab-btn" id="btn-board" onclick="switchTab('board-panel')">積分板</button>
    </div>

    <div class="main-container">
        
        <div id="input-panel" class="panel active">
            <div class="setup-card" id="setup-area">
                <div class="form-group">
                    <label id="label-player-count">選擇人數 (請輸入數字)</label>
                    <input type="number" id="player-count" class="setup-input" value="4" min="2" max="52" oninput="initPlayerInputs()">
                </div>
                <label id="label-names-help">依據初始順時針座位輸入玩家名字</label>
                <div class="names-grid" id="names-fields-box"></div>
                <button class="action-btn" id="btn-create-game" onclick="startNewGame()">建立新對局</button>
            </div>

            <div id="game-play-area" style="display: none;">
                <div class="game-header">
                    <div class="round-title" id="display-round-title">局 1</div>
                    <div class="dealer-tip" id="display-dealer-name">👑 莊家: --</div>
                </div>

                <button class="action-btn btn-secondary" id="btn-toggle-manage" onclick="toggleManagePlayers()">👥 調整玩家次序 / 人數</button>
                <div id="manage-players-box" class="manage-box">
                    <h3 id="label-manage-title" style="font-size:14px; color:var(--primary);">管理目前玩家 (可直接拖曳排序)</h3>
                    <div class="drag-list" id="manage-drag-list"></div>
                    <div style="display:flex; gap:8px; margin-top:10px;">
                        <input type="text" id="new-player-name" placeholder="輸入新玩家名字" style="flex:1; padding:10px; background:#2d2d2d; border:1px solid var(--border); color:#fff; border-radius:6px; font-size:14px;">
                        <button class="lang-btn" onclick="addNewPlayer()" style="background:var(--primary); color:#000; padding:0 12px; border-radius:6px; font-weight:bold; margin:0;" id="btn-add-player">➕ 新增</button>
                    </div>
                </div>

                <div style="margin-bottom: 12px; font-size: 13px; color: var(--text-muted);" id="seat-order-notice">
                    🔄 <span>座位已順序對齊：<strong>預計墩數由莊家首叫 ➡️ 實際墩數自動調整至首攻先行</strong></span>
                </div>

                <div id="section-bid">
                    <div class="section-label"><span id="label-bid">預計取得墩數 (依叫注順序)</span> <span id="screw-notice" style="color:#f1c40f; font-size:12px;"></span></div>
                    <div class="inputs-grid" id="grid-bid-inputs"></div>
                    <button class="action-btn" id="btn-start-round" onclick="lockBids()">開始本局</button>
                </div>

                <div id="section-result" style="opacity: 0.4; pointer-events: none;">
                    <div class="section-label"><span id="label-result">實際贏取墩數 (自動調整至首攻先行)</span> <span id="result-order-notice" style="color:#3498db; font-size:12px;">(⚡已將最後一位移至最前)</span></div>
                    <div class="inputs-grid" id="grid-result-inputs"></div>
                    <button class="action-btn" id="btn-end-round" onclick="submitResults()" disabled>結束本局</button>
                </div>

                <button class="action-btn btn-warning" id="btn-reset-round" onclick="resetCurrentRound()">↩️ 重設本局</button>

                <div class="history-card" id="last-round-card" style="display: none;">
                    <h4 id="label-last-round-scores">上一局得分</h4>
                    <div id="last-round-list"></div>
                </div>
            </div>
        </div>

        <div id="board-panel" class="panel">
            
            <div class="board-controls" id="board-action-controls" style="display: none;">
                <button class="action-btn btn-success" id="btn-export" onclick="exportToExcel()">📊 匯出 Excel 檔</button>
                <button class="action-btn btn-secondary" id="btn-reset-game" onclick="resetGameClicked()">🔄 重設遊戲</button>
            </div>

            <div style="margin-bottom: 10px; font-size: 13px; color: var(--text-muted); display: flex; justify-content: space-between;">
                <span id="label-live-rank-notice">💡 積分板已開啟「即時排行榜」排序 (由左至右為第一名到最後名)</span>
            </div>
            
            <div class="table-responsive-wrapper">
                <table class="score-board-table">
                    <thead>
                        <tr id="board-th-row">
                            <th class="round-col" id="board-round-col">局</th>
                        </tr>
                    </thead>
                    <tbody id="board-tbody">
                        <tr><td colspan="5" style="color:var(--text-muted); padding:30px;" id="board-empty-text">對局建立後將在此實時更新積分表格</td></tr>
                    </tbody>
                </table>
            </div>
        </div>

    </div>

    <!-- 💡 整合 Expand & Collapse 的說明與玩法區塊 -->
    <section class="gb-doc-section" id="about-doc-section"></section>

<script>

    let pCount = 4, currentRound = 1;

    window.onload = function() { 
        const savedLang = localStorage.getItem('gb-preferred-lang');
        if (savedLang) currentLang = savedLang;
        initPlayerInputs(); 
        window.addEventListener('resize', handleResize);
        checkLocalStorageLoad(); 
        switchGlobalLanguage(currentLang);
    };

    function getDisplayNameByRawString(name) {
        if (!name) return "";
        for (let i = 0; i < 60; i++) {
            for (let lang in translations) {
                let defName = translations[lang].playerDefaultName.replace('{char}', String.fromCharCode(65 + i));
                if (name === defName) {
                    return translations[currentLang].playerDefaultName.replace('{char}', String.fromCharCode(65 + i));
                }
            }
        }
        return name;
    }

    function getPlayerDisplayName(pId) {
        return getDisplayNameByRawString(initialPlayers[pId]);
    }

    function getAllGamePlayers() {
        let allNamesSet = new Set(initialPlayers);
        scoresHistory.forEach(h => {
            if (h.roundScores) {
                Object.keys(h.roundScores).forEach(name => {
                    if (name) allNamesSet.add(name);
                });
            }
        });
        return Array.from(allNamesSet).sort((a, b) => getPlayerTotalScore(b) - getPlayerTotalScore(a));
    }

    function handleResize() {
        let checkDesktop = window.innerWidth >= 850;
        if(checkDesktop !== isDesktop) {
            isDesktop = checkDesktop;
            if(scoresHistory.length >= 0) renderScoreBoard();
            if(!isDesktop) switchTab('input-panel');
        }
    }

    function switchTab(tabId) {
        if(isDesktop) return;
        document.getElementById('btn-input').classList.remove('active');
        document.getElementById('btn-board').classList.remove('active');
        document.getElementById('input-panel').classList.remove('active');
        document.getElementById('board-panel').classList.remove('active');

        if(tabId === 'input-panel') {
            document.getElementById('btn-input').classList.add('active');
            document.getElementById('input-panel').classList.add('active');
        } else {
            document.getElementById('btn-board').classList.add('active');
            document.getElementById('board-panel').classList.add('active');
            renderScoreBoard();
        }
    }

    function initPlayerInputs() {
        let rawVal = document.getElementById('player-count').value;
        pCount = parseInt(rawVal);
        if (isNaN(pCount) || pCount < 2) pCount = 4;
        
        const box = document.getElementById('names-fields-box');
        let existingNames = [];
        for(let i=0; i<pCount; i++) {
            let el = document.getElementById(`p-name-in-${i}`);
            if (el) existingNames.push(el.value);
        }

        box.innerHTML = '';
        const t = translations[currentLang];
        for(let i=0; i<pCount; i++) {
            let defVal = t.playerDefaultName.replace('{char}', String.fromCharCode(65 + i));
            let valToSet = defVal;
            if (existingNames[i]) {
                let isDefault = false;
                for (let lang in translations) {
                    let oldDef = translations[lang].playerDefaultName.replace('{char}', String.fromCharCode(65 + i));
                    if (existingNames[i] === oldDef) { isDefault = true; break; }
                }
                if (!isDefault) valToSet = existingNames[i];
            }
            box.innerHTML += `<input type="text" id="p-name-in-${i}" value="${valToSet}">`;
        }
    }

    function saveToLocalStorage() {
        localStorage.setItem('gb_pCount', pCount);
        localStorage.setItem('gb_currentRound', currentRound);
        localStorage.setItem('gb_initialPlayers', JSON.stringify(initialPlayers));
        localStorage.setItem('gb_scoresHistory', JSON.stringify(scoresHistory));
    }

    function checkLocalStorageLoad() {
        let savedHistory = localStorage.getItem('gb_scoresHistory');
        if (savedHistory && JSON.parse(savedHistory).length > 0) {
            scoresHistory = JSON.parse(savedHistory);
            pCount = parseInt(localStorage.getItem('gb_pCount'));
            currentRound = parseInt(localStorage.getItem('gb_currentRound'));
            initialPlayers = JSON.parse(localStorage.getItem('gb_initialPlayers'));

            document.getElementById('setup-area').style.display = 'none';
            document.getElementById('game-play-area').style.display = 'block';
            document.getElementById('board-action-controls').style.display = 'grid'; 

            setupRoundUI();
            renderScoreBoard();
            if(scoresHistory.length > 0) showLastRoundCard(scoresHistory[scoresHistory.length - 1].roundScores);
        }
    }

    function resetToSetup() {
        localStorage.removeItem('gb_pCount');
        localStorage.removeItem('gb_currentRound');
        localStorage.removeItem('gb_initialPlayers');
        localStorage.removeItem('gb_scoresHistory');
        
        document.getElementById('setup-area').style.display = 'block';
        document.getElementById('game-play-area').style.display = 'none';
        document.getElementById('last-round-card').style.display = 'none';
        document.getElementById('board-action-controls').style.display = 'none';

        const t = translations[currentLang];
        document.getElementById('board-tbody').innerHTML = `<tr><td id="board-empty-text" colspan="5" style="color:var(--text-muted); padding:30px;">${t.boardEmptyText}</td></tr>`;
        initPlayerInputs();
        if(!isDesktop) switchTab('input-panel');
    }

    function resetGameClicked() {
        if(confirm(translations[currentLang].confirmResetScores)) resetToSetup();
    }

    function startNewGame() {
        let rawVal = document.getElementById('player-count').value;
        pCount = parseInt(rawVal);
        const t = translations[currentLang];
        if (isNaN(pCount) || pCount < 2) { alert(t.alertInvalidCount); return; }

        initialPlayers = [];
        for(let i=0; i<pCount; i++) {
            let nameIn = document.getElementById(`p-name-in-${i}`);
            let name = nameIn ? nameIn.value.trim() : "";
            initialPlayers.push(name || t.playerDefaultName.replace('{char}', String.fromCharCode(65 + i)));
        }
        
        currentRound = 1;
        scoresHistory = [];
        document.getElementById('setup-area').style.display = 'none';
        document.getElementById('game-play-area').style.display = 'block';
        document.getElementById('board-action-controls').style.display = 'grid'; 
        
        saveToLocalStorage(); 
        setupRoundUI();
        renderScoreBoard();
    }

    function getRoundSeatOrder() {
        let dealerIdx = (currentRound - 1) % pCount;
        let order = [];
        for (let i = 0; i < pCount; i++) {
            order.push((dealerIdx + i) % pCount);
        }
        return order; 
    }

    function getRoundResultSeatOrder() {
        let bidOrder = getRoundSeatOrder();
        let order = [...bidOrder];
        let lastPlayer = order.pop();
        order.unshift(lastPlayer);
        return order;
    }

    function getPlayerTotalScore(name) {
        let total = 0;
        scoresHistory.forEach(h => {
            if (h.roundScores[name] !== undefined) total += h.roundScores[name];
        });
        return total;
    }

    function getRunningTotalUpTo(name, roundIdx) {
        let total = 0;
        for (let i = 0; i <= roundIdx; i++) {
            if (scoresHistory[i].roundScores[name] !== undefined) total += scoresHistory[i].roundScores[name];
        }
        return total;
    }

    function setupRoundUI() {
        const t = translations[currentLang];
        let maxCardsPerPerson = Math.floor(52 / pCount);
        let currentHandCards = ((currentRound - 1) % maxCardsPerPerson) + 1;

        let dealerIdx = (currentRound - 1) % pCount;
        let screwIdx = (dealerIdx + pCount - 1) % pCount; 

        document.getElementById('display-round-title').innerText = t.roundTitleTemplate.replace('{round}', currentRound).replace('{cards}', currentHandCards);
        document.getElementById('display-dealer-name').innerText = t.dealerTipTemplate.replace('{name}', getPlayerDisplayName(dealerIdx));

        let roundSeatOrder = getRoundSeatOrder();
        const bidGrid = document.getElementById('grid-bid-inputs');
        bidGrid.innerHTML = '';
        bidGrid.style.gridTemplateColumns = pCount > 4 ? `repeat(${Math.ceil(pCount/2)}, 1fr)` : "repeat(4, 1fr)";
        
        roundSeatOrder.forEach((idx) => {
            let name = getPlayerDisplayName(idx);
            let isDealer = (idx === dealerIdx);
            let isScrew = (idx === screwIdx);
            
            let labelTag = '';
            if (isDealer) labelTag += t.tagDealer;
            if (isScrew) labelTag += t.tagScrew;
            
            let labelClass = '';
            if (isDealer) labelClass += 'dealer-highlight ';
            if (isScrew) labelClass += 'screw-highlight-txt ';
            
            let inputClass = '';
            if (isDealer) inputClass += 'dealer-border ';
            if (isScrew) inputClass += 'screw-highlight ';

            bidGrid.innerHTML += `
                <div style="margin-bottom: 5px;">
                    <div class="player-label ${labelClass.trim()}" title="${name}">${name}${labelTag}</div>
                    <input type="number" pattern="[0-9]*" inputmode="numeric" min="0" max="${currentHandCards}" 
                           class="mobile-input ${inputClass.trim()}" id="bid-${idx}" oninput="handleBidInput(${idx}, ${currentHandCards})">
                </div>`;
        });

        document.getElementById('screw-notice').innerText = t.screwNoticeDefault;
        document.getElementById('section-bid').style.opacity = "1";
        document.getElementById('section-bid').style.pointerEvents = "auto";
        document.getElementById('btn-start-round').style.display = "block";
        
        document.getElementById('section-result').style.opacity = "0.4";
        document.getElementById('section-result').style.pointerEvents = "none";
        document.getElementById('btn-end-round').disabled = true;
        
        let roundResultSeatOrder = getRoundResultSeatOrder();
        const resGrid = document.getElementById('grid-result-inputs');
        resGrid.innerHTML = '';
        resGrid.style.gridTemplateColumns = pCount > 4 ? `repeat(${Math.ceil(pCount/2)}, 1fr)` : "repeat(4, 1fr)";
        
        roundResultSeatOrder.forEach((idx) => {
            let name = getPlayerDisplayName(idx);
            let isDealer = (idx === dealerIdx);
            let isScrew = (idx === screwIdx);
            
            let labelTag = '';
            if (isDealer) labelTag += t.tagDealer;
            if (isScrew) labelTag += t.tagScrew;
            
            let labelClass = '';
            if (isDealer) labelClass += 'dealer-highlight ';
            if (isScrew) labelClass += 'screw-highlight-txt ';
            
            let inputClass = '';
            if (isDealer) inputClass += 'dealer-border ';
            if (isScrew) inputClass += 'screw-highlight ';

            resGrid.innerHTML += `
                <div style="margin-bottom: 5px;">
                    <div class="player-label ${labelClass.trim()}" title="${name}">${name}${labelTag}</div>
                    <input type="number" pattern="[0-9]*" inputmode="numeric" min="0" max="${currentHandCards}" 
                           class="mobile-input ${inputClass.trim()}" id="res-${idx}" oninput="handleResultInput(${idx}, ${currentHandCards})">
                </div>`;
        });
    }

    function handleBidInput(playerIdx, maxCards) {
        let inputEl = document.getElementById(`bid-${playerIdx}`);
        if(inputEl.value === '') return;
        let intVal = parseInt(inputEl.value);
        if(intVal > maxCards || intVal < 0) {
            alert(translations[currentLang].alertMaxCardsBid.replace(/{maxCards}/g, maxCards));
            inputEl.value = '';
            return;
        }
        validateScrewBid(maxCards);
    }

    function handleResultInput(playerIdx, maxCards) {
        let inputEl = document.getElementById(`res-${playerIdx}`);
        if(inputEl.value === '') return;
        let intVal = parseInt(inputEl.value);
        if(intVal > maxCards || intVal < 0) {
            alert(translations[currentLang].alertMaxCardsResult.replace(/{maxCards}/g, maxCards));
            inputEl.value = '';
        }
    }

    function validateScrewBid(maxCards) {
        let dealerIdx = (currentRound - 1) % pCount;
        let screwIdx = (dealerIdx + pCount - 1) % pCount; 
        const t = translations[currentLang];
        
        let sum = 0;
        let enteredCount = 0;
        for(let i=0; i<pCount; i++) {
            if(i !== screwIdx) {
                let bidEl = document.getElementById(`bid-${i}`);
                if(bidEl && bidEl.value !== '') { sum += parseInt(bidEl.value); enteredCount++; }
            }
        }
        
        let forbidden = maxCards - sum;
        if(enteredCount === pCount - 1 && forbidden >= 0) {
            document.getElementById('screw-notice').innerText = t.screwNoticeForbidden.replace('{forbidden}', forbidden);
            let screwInput = document.getElementById(`bid-${screwIdx}`);
            if(screwInput && parseInt(screwInput.value) === forbidden) {
                alert(t.alertScrewForbiddenMsg.replace('{forbidden}', forbidden));
                screwInput.value = '';
            }
        } else {
            document.getElementById('screw-notice').innerText = t.screwNoticeDefault;
        }
    }

    function resetCurrentRound() {
        if(confirm(translations[currentLang].confirmResetRound.replace('{round}', currentRound))) setupRoundUI();
    }

    function lockBids() {
        for(let i=0; i<pCount; i++) {
            let bidEl = document.getElementById(`bid-${i}`);
            if(!bidEl || bidEl.value === '') { alert(translations[currentLang].alertFillAllBids); return; }
        }
        document.getElementById('section-bid').style.opacity = "0.4";
        document.getElementById('section-bid').style.pointerEvents = "none";
        document.getElementById('btn-start-round').style.display = "none";
        
        document.getElementById('section-result').style.opacity = "1";
        document.getElementById('section-result').style.pointerEvents = "auto";
        document.getElementById('btn-end-round').disabled = false;
    }

    function submitResults() {
        let maxCards = ((currentRound - 1) % Math.floor(52 / pCount)) + 1;
        let roundBids = {}, roundResults = {}, roundScores = {};
        let totalResultSum = 0;
        const t = translations[currentLang];

        for(let i=0; i<pCount; i++) {
            let name = initialPlayers[i];
            let resEl = document.getElementById(`res-${i}`);
            let bidEl = document.getElementById(`bid-${i}`);
            
            let resInt = (resEl && resEl.value.trim() !== "") ? parseInt(resEl.value) : 0;
            let bidInt = (bidEl && bidEl.value.trim() !== "") ? parseInt(bidEl.value) : 0;
            
            let score = (bidInt === resInt) ? (10 + Math.pow(resInt, 2)) : -Math.pow(Math.abs(resInt - bidInt), 2);
            
            roundBids[name] = bidInt;
            roundResults[name] = resInt;
            roundScores[name] = score;
            totalResultSum += resInt;
        }

        if(totalResultSum !== maxCards) {
            alert(t.alertResultSumErr.replace(/{maxCards}/g, maxCards));
            return;
        }

        scoresHistory.push({ round: currentRound, bids: roundBids, results: roundResults, roundScores: roundScores });

        showLastRoundCard(roundScores);
        renderScoreBoard();
        
        currentRound++;
        saveToLocalStorage(); 
        setupRoundUI();
    }

    function showLastRoundCard(scoresObj) {
        document.getElementById('last-round-card').style.display = 'block';
        const list = document.getElementById('last-round-list');
        list.innerHTML = '';
        
        let sortedNames = getAllGamePlayers();
        sortedNames.forEach((name) => {
            let s = scoresObj[name];
            if (s !== undefined) {
                list.innerHTML += `<div class="history-item"><span>${getDisplayNameByRawString(name)}</span> <strong>${s > 0 ? '+' + s : s}</strong></div>`;
            }
        });
    }

    function renderScoreBoard() {
        const t = translations[currentLang];
        const thr = document.getElementById('board-th-row');
        thr.innerHTML = `<th class="round-col" id="board-round-col">${t.boardRoundCol}</th>`;
        
        let sortedNames = getAllGamePlayers();
        sortedNames.forEach((name, rankIdx) => {
            let rankClass = rankIdx < 3 ? `rank-${rankIdx}` : '';
            thr.innerHTML += `<th class="${rankClass}">${getDisplayNameByRawString(name)}</th>`;
        });

        const tbody = document.getElementById('board-tbody');
        tbody.innerHTML = '';

        if(scoresHistory.length === 0) {
            tbody.innerHTML = `<tr><td id="board-empty-text" colspan="${sortedNames.length+1}" style="color:var(--text-muted); padding:30px;">${t.boardEmptyText}</td></tr>`;
            return;
        }

        scoresHistory.forEach((h, rIdx) => {
            let rowHtml = `<tr><td class="round-col">${h.round}</td>`;
            sortedNames.forEach(name => {
                if (h.roundScores[name] !== undefined) {
                    rowHtml += `<td>${getRunningTotalUpTo(name, rIdx)}<span class="score-detail">(${h.bids[name]}|${h.results[name]})</span></td>`;
                } else {
                    rowHtml += `<td>-<span class="score-detail">(-)</span></td>`;
                }
            });
            rowHtml += `</tr>`;
            tbody.innerHTML += rowHtml;
        });

        let totalHtml = `<tr class="total-row"><td class="round-col">${t.boardTotalRow}</td>`;
        sortedNames.forEach((name, rankIdx) => { 
            let rankClass = rankIdx < 3 ? `rank-${rankIdx}` : '';
            totalHtml += `<td class="${rankClass}">${getPlayerTotalScore(name)}</td>`; 
        });
        totalHtml += `</tr>`;
        tbody.innerHTML += totalHtml;
    }

    function toggleManagePlayers() {
        const box = document.getElementById('manage-players-box');
        if(box.style.display === 'block') {
            box.style.display = 'none';
        } else {
            box.style.display = 'block';
            renderManagePlayers();
        }
    }

    function renderManagePlayers() {
        const list = document.getElementById('manage-drag-list');
        list.innerHTML = '';
        initialPlayers.forEach((name, i) => {
            list.innerHTML += `
                <div class="drag-item" draggable="true" 
                     ondragstart="handleDragStart(event, ${i})" 
                     ondragover="handleDragOver(event)" 
                     ondrop="handleDrop(event, ${i})">
                    <span>☰ ${getDisplayNameByRawString(name)}</span>
                    <button class="delete-p-btn" onclick="deletePlayer(${i})">❌</button>
                </div>`;
        });
    }

    function handleDragStart(e, index) {
        dragSrcIndex = index;
        e.dataTransfer.effectAllowed = 'move';
    }

    function handleDragOver(e) { e.preventDefault(); }

    function handleDrop(e, targetIndex) {
        e.preventDefault();
        if (dragSrcIndex !== null && dragSrcIndex !== targetIndex) {
            const movedItem = initialPlayers.splice(dragSrcIndex, 1)[0];
            initialPlayers.splice(targetIndex, 0, movedItem);
            pCount = initialPlayers.length;
            
            saveToLocalStorage();
            renderManagePlayers();
            setupRoundUI();
            renderScoreBoard();
        }
    }

    function deletePlayer(index) {
        const t = translations[currentLang];
        if(initialPlayers.length <= 2) { alert(t.alertMinPlayers); return; }
        
        initialPlayers.splice(index, 1);
        pCount = initialPlayers.length;
        
        saveToLocalStorage();
        renderManagePlayers();
        setupRoundUI();
        renderScoreBoard();
    }

    function addNewPlayer() {
        const input = document.getElementById('new-player-name');
        let name = input.value.trim();
        if(!name) return;
        
        initialPlayers.push(name);
        pCount = initialPlayers.length;
        input.value = '';
        
        saveToLocalStorage();
        renderManagePlayers();
        setupRoundUI();
        renderScoreBoard();
    }

    function exportToExcel() {
        const t = translations[currentLang];
        if(scoresHistory.length === 0) { alert(t.alertNoHistory); return; }

        let sortedNames = getAllGamePlayers();
        let csvContent = `${t.boardRoundCol},`;
        sortedNames.forEach((name, index) => {
            csvContent += `${getDisplayNameByRawString(name)} (${t.excelRankLabel.replace('{rank}', index+1)}),`;
        });
        csvContent += "\n";

        scoresHistory.forEach((h, rIdx) => {
            csvContent += `${h.round},`;
            sortedNames.forEach(name => {
                if(h.roundScores[name] !== undefined) {
                    csvContent += `"${getRunningTotalUpTo(name, rIdx)} (${h.bids[name]}|${h.results[name]})",`;
                } else {
                    csvContent += `"-",`;
                }
            });
            csvContent += "\n";
        });

        csvContent += `${t.excelTotalScore},`;
        sortedNames.forEach(name => { csvContent += `${getPlayerTotalScore(name)},`; });
        csvContent += "\n";

        const blob = new Blob([new Uint8Array([0xEF, 0xBB, 0xBF]), csvContent], { type: 'text/csv;charset=utf-8;' });
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.setAttribute("href", url);
        let dateStr = new Date().toISOString().slice(0,10);
        link.setAttribute("download", `german_bridge_${dateStr}.csv`);
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    }
</script>
</body>
</html>
